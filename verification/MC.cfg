\* TLC model configuration for seqlock.tla
\* Run:  tlc MC -config MC.cfg

CONSTANTS
    NumReaders = 2
    RingSize = 2
    MaxSeq = 4

SPECIFICATION FairSpec

\* --- Invariants (checked at every reachable state) ---
INVARIANT NoTornRead
INVARIANT ResultIsValid

\* --- Liveness properties (checked on the behaviour graph) ---
PROPERTY ReaderProgress
